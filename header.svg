<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Fade flag to dark (right side) -->
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="38%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="72%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>

    <!-- Silk sheen: red stripe -->
    <linearGradient id="sheenRed" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.30"/>
      <stop offset="45%"  stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Silk sheen: blue stripe -->
    <linearGradient id="sheenBlue" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.28"/>
    </linearGradient>

    <!-- Silk sheen: white stripe (darker silver) -->
    <linearGradient id="sheenWhite" x1="0.1" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="white"  stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#333"   stop-opacity="0.50"/>
    </linearGradient>

    <!-- Drop shadow for coat of arms -->
    <filter id="coa-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.45)"/>
    </filter>

  </defs>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  WHITE CANVAS BACKGROUND                                  -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect width="900" height="200" fill="#0d1117"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  WAVING FLAG — RED STRIPE                                 -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <path fill="#C6363C">
    <animate attributeName="d"
      dur="4s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="
        M 0,0 L 900,0 L 900,67 C 750,84 600,50 450,67 C 300,84 150,50 0,67 Z;
        M 0,0 L 900,0 L 900,67 C 750,50 600,84 450,67 C 300,50 150,84 0,67 Z;
        M 0,0 L 900,0 L 900,67 C 750,84 600,50 450,67 C 300,84 150,50 0,67 Z
      "/>
  </path>
  <!-- Red silk sheen -->
  <path fill="url(#sheenRed)">
    <animate attributeName="d"
      dur="4s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="
        M 0,0 L 900,0 L 900,67 C 750,84 600,50 450,67 C 300,84 150,50 0,67 Z;
        M 0,0 L 900,0 L 900,67 C 750,50 600,84 450,67 C 300,50 150,84 0,67 Z;
        M 0,0 L 900,0 L 900,67 C 750,84 600,50 450,67 C 300,84 150,50 0,67 Z
      "/>
  </path>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  WAVING FLAG — BLUE STRIPE                                -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <path fill="#0C4076">
    <animate attributeName="d"
      dur="4s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="
        M 0,67 C 150,50 300,84 450,67 C 600,50 750,84 900,67 L 900,133 C 750,150 600,116 450,133 C 300,150 150,116 0,133 Z;
        M 0,67 C 150,84 300,50 450,67 C 600,84 750,50 900,67 L 900,133 C 750,116 600,150 450,133 C 300,116 150,150 0,133 Z;
        M 0,67 C 150,50 300,84 450,67 C 600,50 750,84 900,67 L 900,133 C 750,150 600,116 450,133 C 300,150 150,116 0,133 Z
      "/>
  </path>
  <!-- Blue silk sheen -->
  <path fill="url(#sheenBlue)">
    <animate attributeName="d"
      dur="4s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="
        M 0,67 C 150,50 300,84 450,67 C 600,50 750,84 900,67 L 900,133 C 750,150 600,116 450,133 C 300,150 150,116 0,133 Z;
        M 0,67 C 150,84 300,50 450,67 C 600,84 750,50 900,67 L 900,133 C 750,116 600,150 450,133 C 300,116 150,150 0,133 Z;
        M 0,67 C 150,50 300,84 450,67 C 600,50 750,84 900,67 L 900,133 C 750,150 600,116 450,133 C 300,150 150,116 0,133 Z
      "/>
  </path>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  WAVING FLAG — WHITE STRIPE                               -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <path fill="#9eabc0">
    <animate attributeName="d"
      dur="4s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="
        M 0,133 C 150,116 300,150 450,133 C 600,116 750,150 900,133 L 900,200 L 0,200 Z;
        M 0,133 C 150,150 300,116 450,133 C 600,150 750,116 900,133 L 900,200 L 0,200 Z;
        M 0,133 C 150,116 300,150 450,133 C 600,116 750,150 900,133 L 900,200 L 0,200 Z
      "/>
  </path>
  <!-- White stripe sheen -->
  <path fill="url(#sheenWhite)">
    <animate attributeName="d"
      dur="4s" repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
      values="
        M 0,133 C 150,116 300,150 450,133 C 600,116 750,150 900,133 L 900,200 L 0,200 Z;
        M 0,133 C 150,150 300,116 450,133 C 600,150 750,116 900,133 L 900,200 L 0,200 Z;
        M 0,133 C 150,116 300,150 450,133 C 600,116 750,150 900,133 L 900,200 L 0,200 Z
      "/>
  </path>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  FADE TO WHITE (right side)                               -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect width="900" height="200" fill="url(#fadeRight)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  SERBIA — ghost watermark text behind flag               -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <text x="200" y="148"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="105"
        font-weight="900"
        font-style="italic"
        fill="#ffffff"
        opacity="0.055"
        letter-spacing="-3">
    SRBIJA
  </text>

  <!-- Three thin flag-color stripes on the left edge (subtle bookmark) -->
  <rect x="0" y="0"   width="5" height="67"  fill="#C6363C" opacity="0.85"/>
  <rect x="0" y="67"  width="5" height="66"  fill="#0C4076" opacity="0.85"/>
  <rect x="0" y="133" width="5" height="67"  fill="#9eabc0" opacity="0.85"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  TEXT — right side (over white area)                      -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- Name -->
  <text x="640" y="75"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="36"
        font-weight="700"
        fill="#e6edf3"
        letter-spacing="1.2">
    Mihailo Ranitovic
  </text>

  <!-- Role — gold to pop on dark -->
  <text x="640" y="108"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="16"
        font-weight="600"
        fill="#FFD700"
        letter-spacing="0.5">
    Full Stack SaaS Developer
  </text>

  <!-- Divider line -->
  <line x1="490" y1="120" x2="790" y2="120" stroke="#30363d" stroke-width="1"/>

  <!-- Stack — each tech in its own color -->
  <text x="640" y="143"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="600">
    <tspan fill="#61DAFB">React</tspan><tspan fill="#3a3f47"> · </tspan><tspan fill="#a855f7">React Native</tspan><tspan fill="#3a3f47"> · </tspan><tspan fill="#FFD43B">Python</tspan><tspan fill="#3a3f47"> · </tspan><tspan fill="#f97316">AI-Powered Products</tspan>
  </text>

</svg>
